<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./docs/images/favicon-32x32.png" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Frontend Mentor | Profile card component</title>
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <header>
        <img
          src="./docs/images/image-victor.jpg"
          alt="Victor's profile photo"
          class="profil-photo" />
      </header>
      <div class="profil">
        <h1>Victor Crest <span>26</span></h1>
        <address>London</address>
      </div>
      <div class="stats">
        <div class="stat follows">
          <h2>80K</h2>
          <p>Followers</p>
        </div>
        <div class="stat likes">
          <h2>803K</h2>
          <p>Likes</p>
        </div>
        <div class="stat photos">
          <h2>1.4K</h2>
          <p>Photos</p>
        </div>
      </div>
    </div>
    <footer class="attribution">
      Challenge by
      <a
        href="https://www.frontendmentor.io/challenges/profile-card-component-cfArpWshJ"
        >Frontend Mentor</a
      >. Coded by
      <a href="https://github.com/Thomas-Bezille/">Thomas Bezille</a>.
    </footer>
  </body>
</html>
